{{- if .Values.postgresql.enabled }}
---
# Database credentials secret for LiteLLM
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "litellm-openshift.litellm-fullname" . }}-db
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  username: {{ .Values.postgresql.auth.username | quote }}
  password: {{ include "postgresql.password" . | quote }}
{{- end }}
---
# Environment secret for LiteLLM (contains LITELLM_SALT_KEY)
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "litellm-openshift.litellm-fullname" . }}-env
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  LITELLM_SALT_KEY: {{ .Values.saltKey | default (randAlphaNum 32) | quote }}
